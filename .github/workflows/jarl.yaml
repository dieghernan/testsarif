# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: jarl

on:
  push:
    branches:
    - main
    - master
  workflow_dispatch:
  pull_request:
    # The branches below must be a subset of the branches above
    branches:
    - main
    - master

permissions:
  contents: read

jobs:
  jarl:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {os: windows-latest}
        - {os: macOS-latest}
        - {os: ubuntu-latest}

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Setup R dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: |
          local::.

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2

    - name: Install jarl branch
      run: |
        cargo install jarl  --git https://github.com/etiennebacher/jarl --branch main

    - name: jarl version
      run: |
        jarl --version

    - name: Create sarif jarl
      run: |
        jarl check . --output-format sarif > jarl-results.sarif
      continue-on-error: true

    - name: Upload analysis results to GitHub
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: jarl-results.sarif
        wait-for-processing: true
        category: ${{ matrix.config.os }}
      continue-on-error: true

    - uses: actions/upload-artifact@v7
      with:
        name: jarl-results-${{ matrix.config.os }}
        path: jarl-results.sarif
        if-no-files-found: warn
